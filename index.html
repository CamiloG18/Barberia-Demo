<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Corfyx Demos - Templates Profesionales para tu Negocio</title>
    <meta name="description" content="Explora nuestros templates profesionales para barberías, hoteles y más. Diseños modernos, responsivos y optimizados. Corfyx - Desarrollo de software desde el núcleo." />
    <meta name="keywords" content="templates web, diseño web, páginas web profesionales, corfyx, templates barbería, templates hotel, desarrollo web" />
    <meta name="author" content="Corfyx" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://demo.corfyx.com/" />
    <meta property="og:title" content="Corfyx Demos - Templates Profesionales" />
    <meta property="og:description" content="Explora nuestros templates profesionales para tu negocio. Diseños modernos y responsivos." />
    <meta property="og:image" content="https://demo.corfyx.com/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://demo.corfyx.com/" />
    <meta property="twitter:title" content="Barbería Luxury Neiva - Cortes Modernos y Clásicos" />
    <meta property="twitter:description" content="Barbería profesional en Neiva. Cortes modernos, ambiente premium y atención personalizada." />
    <meta property="twitter:image" content="https://barberia-luxury.com/og-image.jpg" />
    
    <!-- Local Business Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HairSalon",
      "name": "Barbería Luxury",
      "description": "Barbería profesional en Neiva especializada en cortes modernos, clásicos y arreglo de barba",
      "image": "https://barberia-luxury.com/og-image.jpg",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Neiva",
        "addressRegion": "Huila",
        "addressCountry": "CO"
      },
      "telephone": "+57 300 123 4567",
      "priceRange": "$$",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "20:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "09:00",
          "closes": "18:00"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
